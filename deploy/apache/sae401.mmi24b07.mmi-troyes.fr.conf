<VirtualHost *:80>
    ServerName sae401.mmi24b07.mmi-troyes.fr

    ProxyPreserveHost On
    ProxyRequests Off

    # API + admin -> Symfony backend container
    ProxyPass /api http://127.0.0.1:8000/api
    ProxyPassReverse /api http://127.0.0.1:8000/api
    ProxyPass /admin http://127.0.0.1:8000/admin
    ProxyPassReverse /admin http://127.0.0.1:8000/admin

    # Everything else -> Vue frontend container
    ProxyPass / http://127.0.0.1:4173/
    ProxyPassReverse / http://127.0.0.1:4173/

    ErrorLog ${APACHE_LOG_DIR}/sae401-error.log
    CustomLog ${APACHE_LOG_DIR}/sae401-access.log combined
</VirtualHost>
