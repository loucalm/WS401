services:
  database:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_NAME:-app_db}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_USER: ${DB_USER:-user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - db-data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "mysql://${DB_USER:-user}:${DB_PASSWORD:-password}@database:3306/${DB_NAME:-app_db}?serverVersion=8.0.32&charset=utf8mb4"
      APP_ENV: prod
      APP_DEBUG: "0"
      APP_SECRET: ${APP_SECRET:-ChangeThisSymfonySecret_2026_Prod}
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-ChangeThisJwtPassphrase_2026_Prod}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$}
    depends_on:
      - database
    ports:
      - "127.0.0.1:8000:8000"
    command: >-
      sh -lc "
      php bin/console lexik:jwt:generate-keypair --skip-if-exists;
      for i in $(seq 1 30); do
        php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration && break;
        echo 'Database not ready yet, retrying migration in 2s...';
        sleep 2;
      done;
      php bin/console assets:install public --symlink --relative;
      php bin/console cache:clear --env=prod;
      php -S 0.0.0.0:8000 -t public public/index.php
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_ORIGIN: ${VITE_API_ORIGIN:-http://localhost:8000}
    ports:
      - "127.0.0.1:4173:4173"
    depends_on:
      - backend

  adminer:
    image: adminer
    profiles: ["debug"]
    ports:
      - "8080:8080"
    depends_on:
      - database

volumes:
  db-data:
