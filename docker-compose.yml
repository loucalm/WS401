services:
  database:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: app_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3307:3306"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/srv/app
      - backend-vendor:/srv/app/vendor
      - backend-var:/srv/app/var
    environment:
      DATABASE_URL: "mysql://user:password@database:3306/app_db?serverVersion=8.0&charset=utf8mb4"
      APP_ENV: dev
      APP_DEBUG: "0"
      PHP_CLI_SERVER_WORKERS: "8"
    depends_on:
      - database
    ports:
      - "8000:8000"
    command: sh -lc "php bin/console lexik:jwt:generate-keypair --skip-if-exists && php -S 0.0.0.0:8000 -t public"

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host
    depends_on:
      - backend

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - database

volumes:
  db-data:
  backend-vendor:
  backend-var:
  frontend-node-modules:
